name: Manual NPM Publish

on:
  workflow_dispatch:
    inputs:
      distTag:
        description: 'NPM tag (e.g. use "next" to release a test version)'
        required: false
        type: string
        default: 'latest'

env:
  NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'main'
          fetch-depth: 0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.26.1
          run_install: true
      - name: Git Setup
        run: |
          git config --global user.email "bot@webdriver.io"
          git config --global user.name "WebdriverIO Release Bot"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Consume changesets
        run: |
          npx changeset version

          # Bump the monorepo root version so tags always advance.
          # The root is private (never published) and drives the v* tag.
          CURRENT=$(jq -r '.version' package.json)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW="$MAJOR.$((MINOR + 1)).0"
          jq ".version = \"$NEW\"" package.json > package.json.tmp && mv package.json.tmp package.json
          git add package.json

          # Squash into the changeset commit if one was created, otherwise commit standalone.
          if git log -1 --format='%s' | grep -q '^RELEASING:'; then
            git commit --amend --no-edit
          else
            git commit -m "v$NEW"
          fi

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.distTag }}
        run: npx changeset publish --tag "${DIST_TAG}" --no-git-tag

      - name: Push version commit
        run: git push origin main

      - name: GitHub Release & Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(jq -r '.version' package.json)"
          git tag -f "$TAG"
          git push --force origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
