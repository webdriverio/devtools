name: Python Adapter

on:
  push:
    branches:
      - main
    tags:
      - python-v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
    paths:
      - packages/selenium-py-devtools/**
      - packages/shared/**
      - .github/workflows/python.yml

defaults:
  run:
    working-directory: packages/selenium-py-devtools

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Contract is in sync with shared
        run: |
          python scripts/gen_contract.py
          git diff --exit-code src/wdio_selenium_devtools/_contract.py
      - name: 🧪 Unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC) — no token needed
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: 📦 Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: packages/selenium-py-devtools/dist
